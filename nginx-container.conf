# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;


events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1k;
    gzip_http_version 1.1;

    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        application/x-httpd-php
        application/x-yaml
        application/yaml
        image/svg+xml;

    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    include /etc/nginx/conf.d/*.conf;

# ── HTTPS server ────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.awsprompts.com;

    ssl_certificate /etc/letsencrypt/live/www.awsprompts.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.awsprompts.com/privkey.pem;

    # Gold Predictor
    location = /goldpredict {
        return 301 /goldpredict/;
    }

    location ^~ /goldpredict/api/ {
        proxy_pass http://host.containers.internal:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location ^~ /goldpredict/ {
        proxy_pass http://host.containers.internal:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    location /api/ {
        proxy_pass http://139.196.232.194:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── HTTP server ─────────────────────────────────────────────
server {
    listen 80;
    server_name localhost www.awsgpts.com www.awsprompts.com _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gold Predictor
    location = /goldpredict {
        return 301 /goldpredict/;
    }

    location ^~ /goldpredict/api/ {
        proxy_pass http://host.containers.internal:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location ^~ /goldpredict/ {
        proxy_pass http://host.containers.internal:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /wecom/callback {
        proxy_pass http://host.containers.internal:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        alias /usr/share/nginx/html/updates/.well-known/acme-challenge/;
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        add_header 'Access-Control-Allow-Origin' '*';
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        gzip_static on;
        add_header X-Content-Type-Options nosniff;
    }

    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        gzip_static on;
        gzip_types image/svg+xml;
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options nosniff;
    }

    location /avatars/ {
        alias /usr/share/nginx/html/avatars/;
        add_header 'Access-Control-Allow-Origin' '*';
    }

    location /watermark/ {
        alias /usr/share/nginx/html/watermark/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        add_header 'Access-Control-Allow-Origin' '*';
        add_header X-Content-Type-Options nosniff;
    }

    location /updates/ {
        alias /usr/share/nginx/html/updates/;
        add_header 'Access-Control-Allow-Origin' '*';
        autoindex on;
        add_header Cache-Control "no-cache";
        add_header Accept-Ranges bytes;
        client_max_body_size 500M;
        client_body_buffer_size 512k;
        proxy_max_temp_file_size 0;
        proxy_buffering off;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 120;
        send_timeout 120s;
        max_ranges 1;
    }
}
}
